<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/utility.css" />
    <link
      rel="stylesheet"
      href="https://sets.hugeicons.com/YOUR-SET-ID.css"
      crossorigin="anonymous"
    />
    <title>Spotify - Web Player: Music for everyone</title>
  </head>
  <body>
    <div class="container flex">
      <div class="left bg-black">
        <div class="close">
          <img src="icons/close.svg" alt="Close" />
        </div>
        <div class="home rounded bg-grey">
          <div class="logo">
            <img class="invert" src="icons/logo.svg" alt="Spotify Logo" />
          </div>
          <ul>
            <li><img class="invert" src="icons/home.svg" alt="Home" />Home</li>
            <li><img class="invert" src="icons/search.svg" alt="Search" />Search</li>
          </ul>
        </div>
        <div class="library rounded bg-grey">
          <div class="heading">
            <img class="invert" src="icons/library.svg" alt="Library" />
            <h2>Your Songs</h2>
          </div>

          <div class="songList">
            <ul></ul>
          </div>

          <div class="footer">
            <div>
              <a href="https://www.spotify.com/jp/legal/"><span>Legal</span></a>
            </div>
            <div>
              <a href="https://www.spotify.com/jp/privacy/"
                ><span>Privacy Center</span></a
              >
            </div>
            <div>
              <a href="https://www.spotify.com/jp/legal/privacy-policy/"
                ><span>Privacy Policy</span></a
              >
            </div>
            <div>
              <a href="https://www.spotify.com/jp/legal/cookies-policy/"
                ><span>Cookies</span></a
              >
            </div>
            <div>
              <a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"
                ><span>About Ads</span></a
              >
            </div>
            <div>
              <a href="https://www.spotify.com/jp/accessibility/"
                ><span>Accessibility</span></a
              >
            </div>
          </div>
        </div>
      </div>

      <div class="right bg-grey rounded">
        <div class="header rounded">
          <div class="nav">

            <img class="hamburger" src = "icons/hamburger.svg" alt="Hamburger Menu" />

            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
              color="#ffffff"
              fill="none"
              stroke="#ffffff"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18"
              />
            </svg>

            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
              color="#ffffff"
              fill="none"
              stroke="#ffffff"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"
              />
            </svg>
          </div>

          <div class="buttons">
            <button class="signupBtn">Sign up</button>
            <button class="loginBtn">Log In</button>
          </div>
        </div>

        <div class="spotifyPlaylists">
          <h2>Spotify Playlists</h2>
          <div class="card-container flex">

          </div>
        </div>
        <div class="playbar">
          <div class="seekbar">
            <div class="circle"></div>
          </div>
          <div class="flxBox">
            <div class="songInfo"></div>
            <div class="songButtons">
              <img height="30" id="previous" src="icons/prev.svg" alt="Previous Button" />
              <img height="30" id="play" src="icons/play.svg" alt="Play Button" />
              <img height="30" id="next" src="icons/next.svg" alt="Next Button" />
            </div>
            <div class="songTime"></div>
            <div class="volume">
              <img src="icons/volume.svg" alt="Volume Icon" style="cursor: pointer;"/>
              <div class="range">
                <input type="range" name = "volume" min="0" max="100" value="50" class="slider" id="volumeSlider" /> 
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
